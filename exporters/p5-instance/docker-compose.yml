version: '3.8'

services:
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    network_mode: host
    pid: host
    volumes:
      - /:/host:ro,rslave
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.5-3.4.0-ubuntu22.04
    container_name: dcgm-exporter
    restart: unless-stopped
    network_mode: host
    runtime: nvidia
    environment:
      - DCGM_EXPORTER_LISTEN=:9400
    cap_add:
      - SYS_ADMIN

  process-exporter:
    image: ncabatoff/process-exporter:latest
    container_name: process-exporter
    restart: unless-stopped
    network_mode: host
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /etc/passwd:/etc/passwd:ro
      - ./process-exporter.yml:/config/process-exporter.yml
    command:
      - '--procfs=/host/proc'
      - '--config.path=/config/process-exporter.yml'

  gpu-process-exporter:
    build:
      context: .
      dockerfile: Dockerfile.gpu-exporter
    image: gpu-process-exporter:latest
    container_name: gpu-process-exporter
    restart: unless-stopped
    network_mode: host
    pid: host
    runtime: nvidia
    volumes:
      - /etc/passwd:/etc/passwd:ro
