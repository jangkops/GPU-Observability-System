groups:
  - name: instance_alerts
    interval: 30s
    rules:
      # 사용자별 CPU 과부하
      - alert: HighCPUUsage
        expr: |
          sum by (instance, username) (
            rate(namedprocess_namegroup_cpu_seconds_total[5m])
          ) / on(instance) group_left
          count by (instance) (
            node_cpu_seconds_total{mode="idle"}
          ) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} CPU 과부하"
          description: "CPU 사용률 {{ $value | humanizePercentage }}"
          user: "{{ $labels.username }}"

      # 메모리 부족
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} 메모리 부족"
          description: "메모리 사용률 {{ $value | humanizePercentage }}"

      # 디스크 부족
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 5m
        labels:
          severity: warning
          admin_only: "true"
        annotations:
          summary: "{{ $labels.instance }} 디스크 부족"
          description: "디스크 여유 공간 {{ $value | humanizePercentage }}"
