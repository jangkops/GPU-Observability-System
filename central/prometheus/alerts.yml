groups:
  - name: instance_alerts
    interval: 30s
    rules:
      # CPU 과부하
      - alert: HighCPUUsage
        expr: (1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) by (instance)) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} CPU 과부하"
          description: "CPU 사용률 {{ $value | humanizePercentage }}"

      # 메모리 부족
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} 메모리 부족"
          description: "메모리 사용률 {{ $value | humanizePercentage }}"

      # GPU 온도 과열
      - alert: GPUOverheating
        expr: DCGM_FI_DEV_GPU_TEMP > 85
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.instance }} GPU 과열"
          description: "GPU {{ $labels.gpu }} 온도 {{ $value }}°C"

      # 디스크 부족
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} 디스크 부족"
          description: "디스크 여유 공간 {{ $value | humanizePercentage }}"
